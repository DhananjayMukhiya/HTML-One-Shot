<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form</title>
</head>
<body>
    <form>
        <h1>Sample Form</h1>
        
        <label for="name">Name:</label>
        <input type="text" id="name" name="name" placeholder="Full Name" required><br><br>
        
        <label for="email">Email:</label>
        <input type="email" id="email" name="email" placeholder="abc@gmail.com" required><br><br>
        
        <label for="password">Password:</label>
        <input type="password" id="password" name="password" required><br><br>
        
        <label for="phone">Phone:</label>
        <input type="tel" id="phone" name="phone"><br><br>
        
        <label for="dob">Date of Birth:</label>
        <input type="date" id="dob" name="dob"><br><br>
        
        <label for="gender">Gender:</label>
        <input type="radio" name="gender" value="male"> Male
        <input type="radio" name="gender" value="female"> Female<br><br>
        
        <label for="skills">Skills:</label>
        <input type="checkbox" name="skills" value="html"> HTML
        <input type="checkbox" name="skills" value="css"> CSS
        <input type="checkbox" name="skills" value="js"> JavaScript<br><br>
        
        <label for="country">Country:</label>
        <select id="country" name="country">
            <option value="">Select Country</option>
            <option value="usa">USA</option>
            <option value="india">India</option>
            <option value="uk">UK</option>
        </select><br><br>
        
        <label for="message">Message:</label>
        <textarea id="message" name="message" rows="3" cols="50"></textarea><br><br>
        
        <button type="submit">Submit</button>
        <button type="reset">Reset</button>
    </form>

    <iframe src="https://www.codewithharry.com" frameborder="0" width="500px" height="600px"></iframe>
</body>
</html>
